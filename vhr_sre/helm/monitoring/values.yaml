# Default values for monitoring
kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      retention: 15d
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: alicloud-disk-ssd
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 50Gi
      
      # ServiceMonitor for VHR applications
      additionalServiceMonitors:
        - name: vhr-frontend
          selector:
            matchLabels:
              app.kubernetes.io/name: vhr-frontend
          namespaceSelector:
            any: true
          endpoints:
            - port: http
              path: /metrics
              interval: 30s
        
        - name: vhr-backend
          selector:
            matchLabels:
              app.kubernetes.io/name: vhr-backend
          namespaceSelector:
            any: true
          endpoints:
            - port: http
              path: /actuator/prometheus
              interval: 30s

  grafana:
    adminPassword: "admin"
    
    # Additional datasources
    additionalDataSources:
      - name: Loki
        type: loki
        url: http://loki:3100
        access: proxy
        isDefault: false
    
    # Dashboard plugins
    plugins:
      - grafana-piechart-panel
      - grafana-clock-panel
    
    # Default dashboards
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: 'default'
            orgId: 1
            folder: ''
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/default

  alertmanager:
    alertmanagerSpec:
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: alicloud-disk-ssd
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi

# Custom alerts
customAlerts:
  enabled: true
  rules:
    # Application alerts
    - alert: FrontendHighErrorRate
      expr: |
        sum(rate(http_requests_total{job="vhr-frontend",status=~"5.."}[5m])) 
        / 
        sum(rate(http_requests_total{job="vhr-frontend"}[5m])) > 0.05
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Frontend high error rate"
        description: "Error rate is {{ $value | humanizePercentage }}"
    
    - alert: FrontendHighLatency
      expr: |
        histogram_quantile(0.95, 
          sum(rate(http_request_duration_seconds_bucket{job="vhr-frontend"}[5m])) by (le)
        ) > 1
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Frontend high latency"
        description: "P95 latency is {{ $value }}s"
    
    # Container alerts
    - alert: PodCrashLooping
      expr: |
        rate(kube_pod_container_status_restarts_total[15m]) * 60 * 15 > 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
    
    - alert: PodNotReady
      expr: |
        kube_pod_status_phase{phase!="Running"} == 1
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is not ready"
    
    # Resource alerts
    - alert: HighMemoryUsage
      expr: |
        (container_memory_usage_bytes / container_spec_memory_limit_bytes) > 0.9
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Container {{ $labels.namespace }}/{{ $labels.pod }} high memory usage"
    
    - alert: HighCPUUsage
      expr: |
        rate(container_cpu_usage_seconds_total[5m]) > 0.9
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Container {{ $labels.namespace }}/{{ $labels.pod }} high CPU usage"
