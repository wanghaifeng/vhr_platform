pipeline:
  name: VHR Infrastructure Deploy
  identifier: VHR_Infrastructure_Deploy
  projectIdentifier: Default
  orgIdentifier: default
  tags: {}
  variables:
    - name: environment
      type: String
      required: true
      enum:
        - dev
        - test
        - staging
        - perf
        - prod
      default: dev

  stages:
    - stage:
        name: Terraform Plan and Apply
        identifier: Terraform_Plan_and_Apply
        description: "Deploy Terraform infrastructure to <+pipeline.variables.environment> environment."
        type: Custom
        spec:
          execution:
            steps:
              - step:
                  type: Run
                  name: Terraform Init
                  identifier: Terraform_Init
                  spec:
                    connectorRef: account.DockerHub
                    image: hashicorp/terraform:1.6.0
                    shell: Sh
                    command: |-
                      cd vhr_sre/infrastructure
                      export ALICLOUD_ACCESS_KEY=<+secrets.getValue("alicloud_access_key")>
                      export ALICLOUD_SECRET_KEY=<+secrets.getValue("alicloud_secret_key")>
                      terraform -chdir=environments/<+pipeline.variables.environment> init
              - step:
                  type: Run
                  name: Terraform Plan
                  identifier: Terraform_Plan
                  spec:
                    connectorRef: account.DockerHub
                    image: hashicorp/terraform:1.6.0
                    shell: Sh
                    command: |-
                      cd vhr_sre/infrastructure
                      export ALICLOUD_ACCESS_KEY=<+secrets.getValue("alicloud_access_key")>
                      export ALICLOUD_SECRET_KEY=<+secrets.getValue("alicloud_secret_key")>
                      terraform -chdir=environments/<+pipeline.variables.environment> plan -out=tfplan \
                        -var="mysql_root_password=<+secrets.getValue("mysql_root_password")>" \
                        -var="redis_password=<+secrets.getValue("redis_password")>"
              - step:
                  type: HarnessApproval
                  name: Approval
                  identifier: Approval
                  spec:
                    approvalMessage: Please review the terraform plan before applying to <+pipeline.variables.environment>.
                    includePipelineExecutionHistory: true
                    approvers:
                      userGroups:
                        - account._user_all
                    minimumCount: 1
                    isAutoRejectEnabled: false
                    approverInputs: []
              - step:
                  type: Run
                  name: Terraform Apply
                  identifier: Terraform_Apply
                  spec:
                    connectorRef: account.DockerHub
                    image: hashicorp/terraform:1.6.0
                    shell: Sh
                    command: |-
                      cd vhr_sre/infrastructure
                      export ALICLOUD_ACCESS_KEY=<+secrets.getValue("alicloud_access_key")>
                      export ALICLOUD_SECRET_KEY=<+secrets.getValue("alicloud_secret_key")>
                      terraform -chdir=environments/<+pipeline.variables.environment> apply -auto-approve tfplan
        tags: {}
