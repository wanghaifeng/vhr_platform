name: VHR Service CI

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'vhr/**'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'vhr/**'

jobs:
  # Code Scanning
  code-scan:
    name: Code Security Scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: 'vhr'
        format: 'table'
        exit-code: '0'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    - name: Run Node.js audit (Frontend)
      run: npm audit --audit-level=high || true
      working-directory: vhr/vuehr

  # Backend Unit Tests
  unit-test-backend:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 1.8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven

    - name: Run unit tests
      run: mvn test
      working-directory: vhr/vhr/vhrserver

    - name: Upload test coverage
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: backend-test-coverage
        path: vhr/vhr/vhrserver/target/site/jacoco/
        retention-days: 7

  # Frontend Unit Tests
  unit-test-frontend:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16'
        cache: 'npm'
        cache-dependency-path: vhr/vuehr/package-lock.json

    - name: Install dependencies
      run: npm install
      working-directory: vhr/vuehr

    - name: Run unit tests
      run: npm run test:unit || npm run test || echo "No unit test script found"
      working-directory: vhr/vuehr

    - name: Upload test coverage
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: frontend-test-coverage
        path: vhr/vuehr/coverage/
        retention-days: 7

  # E2E Tests
  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16'
        cache: 'npm'
        cache-dependency-path: vhr/vuehr/package-lock.json

    - name: Install dependencies
      run: npm install
      working-directory: vhr/vuehr

    - name: Run E2E tests
      run: npm run test:e2e || npm run e2e || echo "No E2E test script found"
      working-directory: vhr/vuehr

    - name: Upload E2E test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: e2e-test-results
        path: vhr/vuehr/test-results/
        retention-days: 7

  # Build Backend
  build-backend:
    name: Build Spring Boot Backend
    runs-on: ubuntu-latest
    needs: [code-scan, unit-test-backend]
    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 1.8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -DskipTests
      working-directory: vhr/vhr/vhrserver

    - name: Upload backend artifact
      uses: actions/upload-artifact@v3
      with:
        name: backend-jar
        path: vhr/vhr/vhrserver/target/*.jar
        retention-days: 7

  # Build Frontend
  build-frontend:
    name: Build Vue Frontend
    runs-on: ubuntu-latest
    needs: [code-scan, unit-test-frontend, e2e-test]
    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16'
        cache: 'npm'
        cache-dependency-path: vhr/vuehr/package-lock.json

    - name: Install dependencies and build
      run: |
        npm install
        npm run build
      working-directory: vhr/vuehr

    - name: Upload frontend artifact
      uses: actions/upload-artifact@v3
      with:
        name: frontend-dist
        path: vhr/vuehr/dist/
        retention-days: 7
